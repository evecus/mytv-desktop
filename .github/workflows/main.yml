name: Build Desktop

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '版本号 (如 v1.0.0)'
        required: true
        default: 'v1.0.0'
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
          - os: windows-latest
            platform: windows

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── Linux: system deps + libmpv ──────────────────────────────
      - name: Install Linux system deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libmpv-dev \
            patchelf

      # ── Windows: download mpv-dev (includes mpv-2.dll + headers) ─
      - name: Download mpv-dev for Windows
        if: matrix.platform == 'windows'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $release = gh api repos/shinchiro/mpv-winbuild-cmake/releases `
            --jq '[.[] | select(.assets | length > 0)][0]' | ConvertFrom-Json
          $asset = $release.assets | Where-Object { $_.name -match "mpv-dev-x86_64" } | Select-Object -First 1
          Write-Host "Downloading: $($asset.name)"
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile mpv-dev.7z
          7z x mpv-dev.7z -ompv-dev -y

          # Show all extracted files so we know the real names
          Write-Host "=== Extracted files ==="
          Get-ChildItem -Recurse mpv-dev | ForEach-Object { Write-Host $_.FullName }
          Write-Host "======================="

          # Find any .dll (mpv-2.dll or libmpv.dll or mpv.dll)
          $dll = Get-ChildItem -Recurse mpv-dev -Filter "*.dll" | Select-Object -First 1
          if (-not $dll) {
            Write-Error "No .dll found in mpv-dev package"
            exit 1
          }
          Write-Host "Using dll: $($dll.FullName)"

          # Find include dir (contains client.h or mpv/)
          $clientH = Get-ChildItem -Recurse mpv-dev -Filter "client.h" | Select-Object -First 1
          $includePath = if ($clientH) { $clientH.DirectoryName } else { "$pwd\mpv-dev" }
          Write-Host "Include dir: $includePath"

          New-Item -ItemType Directory -Force -Path src-tauri/mpv-libs
          Copy-Item $dll.FullName src-tauri/mpv-libs/

          # libmpv crate expects the lib file too (.lib on Windows)
          $lib = Get-ChildItem -Recurse mpv-dev -Filter "*.lib" | Select-Object -First 1
          if ($lib) {
            Copy-Item $lib.FullName src-tauri/mpv-libs/
            echo "MPV_LIB_DIR=$pwd\src-tauri\mpv-libs" >> $env:GITHUB_ENV
          } else {
            echo "MPV_LIB_DIR=$($dll.DirectoryName)" >> $env:GITHUB_ENV
          }
          echo "MPV_INCLUDE_DIR=$includePath" >> $env:GITHUB_ENV

      - name: Install frontend deps
        run: npm install

      - name: Tag commit (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name  "github-actions"
          git config user.email "github-actions@github.com"
          git tag ${{ github.event.inputs.tag }} || true

      # ── Build ─────────────────────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Windows: libmpv-sys needs these
          MPV_INCLUDE_DIR: ${{ env.MPV_INCLUDE_DIR }}
          MPV_LIB_DIR:     ${{ env.MPV_LIB_DIR }}
        with:
          tagName:     ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: '我的电视 桌面版 ${{ github.event.inputs.tag || github.ref_name }}'
          releaseBody: |
            ## 安装说明

            ### Windows
            下载 `mytv-desktop_x.x.x_x64-setup.exe` 直接安装，无需额外安装任何软件。

            ### Linux
            - `.deb` 包：`sudo dpkg -i mytv-desktop_x.x.x_amd64.deb`
            - `.AppImage`：`chmod +x mytv-desktop_x.x.x_amd64.AppImage && ./mytv-desktop_x.x.x_amd64.AppImage`
          releaseDraft: false
          prerelease:   false

      # ── Linux: patch AppImage to bundle libmpv ───────────────────
      - name: Patch libmpv into AppImage (Linux)
        if: matrix.platform == 'linux'
        run: |
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name "*.AppImage" | head -1)
          if [ -z "$APPIMAGE" ]; then echo "No AppImage found, skipping patch"; exit 0; fi

          # Extract
          "$APPIMAGE" --appimage-extract
          SQUASH=squashfs-root

          # Copy libmpv into AppImage lib dir
          LIBMPV=$(ldconfig -p | grep libmpv | awk '{print $NF}' | head -1)
          if [ -n "$LIBMPV" ]; then
            cp "$LIBMPV" "$SQUASH/usr/lib/"
            patchelf --set-rpath '$ORIGIN/../lib' "$SQUASH/usr/bin/mytv-desktop"
          fi

          # Repack
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool-x86_64.AppImage
          ./appimagetool-x86_64.AppImage "$SQUASH" "${APPIMAGE%.AppImage}-bundled.AppImage"
          echo "Patched AppImage: ${APPIMAGE%.AppImage}-bundled.AppImage"
